# Project Collaboration Pathways - packaging manifest

bundle_id: collaboration-pathways
version: "1.0.0"
title: "Project Collaboration Pathways"
description: >
  Formalizes multi-party technical collaboration as Pathways templates AND carries
  the first canonical, self-describing encoding of the collaboration-bundle technique
  itself. A convergence repository holds verbatim-copied, content-bound, Ed25519-sealed
  assets; a prompt ledger records collaboration meta; an investigation declaration
  captures pending proof; proof pathways emit falsifiable, mostly-unilateral verify
  artifacts; and the technique's own canon + provenance travel inside the bundle.

