# -----------------------------------------------------------------------------
# TECHNIQUE PROVENANCE — the self-describing enhancement (read this to interrogate
# not just the bundle FORMAT, but the collaboration-bundle TECHNIQUE's formalization)
# -----------------------------------------------------------------------------
technique_provenance:
  technique: collaboration-bundle
  technique_version: "1.0 (first canonical Pathways encoding)"
  co_originators:
    - label: "person-a"
      did: did:placeholder:person-a
      role: premise-pattern
      catalog_units: [44]
    - label: "Originator (DJ Thomson)"
      role: pathways-formalization
  authored_enhancements:
    - name: self-describing-bundle
      by: "Originator (DJ Thomson)"
      summary: >
        Every bundle henceforth carries the technique's canon + provenance inside
        itself, for asynchronous interrogability across the ecosystem.
      pathway: Collaboration.Meta.EmbedTechniqueProvenance@v1
      pattern: Pattern.CollaborationBundle.SelfDescribing
      catalyzed_by: the open MikeOSS project and team
  lineage:
    - { stage: 1, repo: collaboration-bundle, role: inbound-premise }
    - { stage: 2, repo: collaboration-bundle-reciprocal, role: reciprocal-handoff }
    - { stage: 3, repo: prior-instance-3, role: attestation-validation }
    - { stage: 4, repo: prior-instance-4, role: deal-flow-seeding }
    - { stage: 5, repo: djat_x_mikeoss, role: first-canonical-technique-encoding }
  defining_pathways:
    - Collaboration.Convergence.AssembleBundle@v1
    - Collaboration.Bundle.RewriteLinks@v1
    - Collaboration.Attestation.BindContentHashes@v1
    - Collaboration.Bundle.SealBundle@v1
    - Collaboration.Bundle.VerifyBundle@v1
    - Collaboration.Meta.EncodePromptLedger@v1
    - Collaboration.Meta.EmbedTechniqueProvenance@v1
    - Collaboration.Investigation.DeclarePending@v1
    - Collaboration.Investigation.PreRegisterHypotheses@v1
    - Collaboration.Investigation.SealOrInvalidateBundle@v1
    - Collaboration.Proof.AwaitCounterpartyBuild@v1
    - Collaboration.Proof.RunUnilateralExperiment@v1
    - Collaboration.Reciprocation.AssembleReturnBundle@v1
    - Experience.Collaboration.OpenInvitation@v1
  defining_patterns:
    - Pattern.ProjectCollaboration.ConvergenceRepository
    - Pattern.CollaborationBundle.SelfDescribing
  interrogate_via:
    canon: collaboration-pathways/canon/COLLABORATION_BUNDLE_TECHNIQUE.md
    index: collaboration-pathways/pathways-index.yaml
    lineage: collaboration-pathways/sidecars/collaboration-pattern-lineage-and-attribution.md
    verify: "python3 tools/collaboration-bundle/sign_bundle.py verify collaboration/20260528-130500"
  license_terms:
    fork: true
    attribution_required: true
    revocation_scope_max: self_only

reciprocation_required: false
reciprocation_optional_welcome:
